version: '3.8'
name: terestria

services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: ${DB_NAME:-terestria_admin}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "${DB_PORT_EXPOSE:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: postgres -c timezone=UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-terestria_admin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:80"
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings_mobile
      - DB_NAME=${DB_NAME:-terestria_admin}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@terestria.com}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-admin}
    volumes:
      - app_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  app_media:
